  <!-- Gradient arrow at bottom -->
  <defs>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3d8ef0"/>
      <stop offset="50%" stop-color="#00b09b"/>
      <stop offset="100%" stop-color="#e05050"/>
    </linearGradient>
  </defs>
  <line x1="25" y1="355" x2="605" y2="355" stroke="url(#arrowGrad)" stroke-width="3"/>
  <polygon points="605,350 620,355 605,360" fill="#e05050"/>
  <text x="315" y="372" fill="#9bb0cc" font-size="13" text-anchor="middle">Représentations de plus en plus abstraites →</text>
