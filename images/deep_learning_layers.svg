  <circle cx="445" cy="130" r="10" fill="#f5c518"/>
  <circle cx="445" cy="180" r="10" fill="#f5c518"/>
  <circle cx="445" cy="230" r="10" fill="#f5c518"/>
  <circle cx="445" cy="280" r="10" fill="#f5c518"/>

  <!-- Neurons output -->
  <circle cx="575" cy="155" r="11" fill="#e05050"/>
  <circle cx="575" cy="200" r="11" fill="#e05050"/>
  <circle cx="575" cy="245" r="11" fill="#e05050"/>

  <!-- Connections (sample, faded) -->
  <g stroke="#3d8ef0" stroke-width="0.4" opacity="0.25">
    <line x1="70" y1="80" x2="170" y2="95"/>
    <line x1="70" y1="80" x2="170" y2="135"/>
    <line x1="70" y1="80" x2="170" y2="215"/>
    <line x1="70" y1="150" x2="170" y2="95"/>
    <line x1="70" y1="150" x2="170" y2="175"/>
    <line x1="70" y1="150" x2="170" y2="255"/>
    <line x1="70" y1="220" x2="170" y2="135"/>
    <line x1="70" y1="220" x2="170" y2="215"/>
    <line x1="70" y1="290" x2="170" y2="255"/>
    <line x1="70" y1="290" x2="170" y2="295"/>
    <line x1="190" y1="95" x2="300" y2="110"/>
    <line x1="190" y1="135" x2="300" y2="155"/>
    <line x1="190" y1="175" x2="300" y2="200"/>
    <line x1="190" y1="215" x2="300" y2="155"/>
    <line x1="190" y1="215" x2="300" y2="245"/>
    <line x1="190" y1="255" x2="300" y2="200"/>
    <line x1="190" y1="295" x2="300" y2="290"/>
    <line x1="320" y1="110" x2="435" y2="130"/>
    <line x1="320" y1="155" x2="435" y2="130"/>
    <line x1="320" y1="155" x2="435" y2="180"/>
    <line x1="320" y1="200" x2="435" y2="180"/>
    <line x1="320" y1="200" x2="435" y2="230"/>
    <line x1="320" y1="245" x2="435" y2="230"/>
    <line x1="320" y1="290" x2="435" y2="280"/>
    <line x1="455" y1="130" x2="564" y2="155"/>
    <line x1="455" y1="130" x2="564" y2="200"/>
    <line x1="455" y1="180" x2="564" y2="155"/>
    <line x1="455" y1="230" x2="564" y2="200"/>
    <line x1="455" y1="280" x2="564" y2="245"/>
