<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="Inter,sans-serif">
  <rect width="700" height="380" fill="#0a1628" rx="12"/>

  <!-- Layer labels at top -->
  <text x="60" y="28" fill="#9bb0cc" font-size="13" text-anchor="middle">Pixels</text>
  <text x="180" y="28" fill="#9bb0cc" font-size="13" text-anchor="middle">Bords</text>
  <text x="310" y="28" fill="#9bb0cc" font-size="13" text-anchor="middle">Textures</text>
  <text x="445" y="28" fill="#9bb0cc" font-size="13" text-anchor="middle">Formes</text>
  <text x="575" y="28" fill="#9bb0cc" font-size="13" text-anchor="middle">Objets</text>

  <!-- Layer backgrounds -->
  <rect x="25" y="38" width="70" height="300" fill="#1a3a5c" rx="8" opacity="0.6"/>
  <rect x="145" y="58" width="70" height="260" fill="#1a3a5c" rx="8" opacity="0.6"/>
  <rect x="275" y="78" width="70" height="220" fill="#1a3a5c" rx="8" opacity="0.6"/>
  <rect x="410" y="98" width="70" height="180" fill="#1a3a5c" rx="8" opacity="0.6"/>
  <rect x="545" y="118" width="60" height="140" fill="#1a3a5c" rx="8" opacity="0.6"/>

  <!-- Neurons layer 1 (input) -->
  <circle cx="60" cy="80" r="10" fill="#3d8ef0"/>
  <circle cx="60" cy="115" r="10" fill="#3d8ef0"/>
  <circle cx="60" cy="150" r="10" fill="#3d8ef0"/>
  <circle cx="60" cy="185" r="10" fill="#3d8ef0"/>
  <circle cx="60" cy="220" r="10" fill="#3d8ef0"/>
  <circle cx="60" cy="255" r="10" fill="#3d8ef0"/>
  <circle cx="60" cy="290" r="10" fill="#3d8ef0"/>
  <circle cx="60" cy="325" r="10" fill="#3d8ef0"/>

  <!-- Neurons layer 2 -->
  <circle cx="180" cy="95" r="10" fill="#1e5fa8"/>
  <circle cx="180" cy="135" r="10" fill="#1e5fa8"/>
  <circle cx="180" cy="175" r="10" fill="#1e5fa8"/>
  <circle cx="180" cy="215" r="10" fill="#1e5fa8"/>
  <circle cx="180" cy="255" r="10" fill="#1e5fa8"/>
  <circle cx="180" cy="295" r="10" fill="#1e5fa8"/>

  <!-- Neurons layer 3 -->
  <circle cx="310" cy="110" r="10" fill="#00b09b"/>
  <circle cx="310" cy="155" r="10" fill="#00b09b"/>
  <circle cx="310" cy="200" r="10" fill="#00b09b"/>
  <circle cx="310" cy="245" r="10" fill="#00b09b"/>
  <circle cx="310" cy="290" r="10" fill="#00b09b"/>

