<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1f40;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Atom symbol - left side -->
  <g transform="translate(58,60)">
    <!-- Nucleus -->
    <circle cx="0" cy="0" r="7" fill="#f5c518"/>
    <!-- Orbit 1 -->
    <ellipse cx="0" cy="0" rx="32" ry="14" fill="none" stroke="#3d8ef0" stroke-width="2.5" opacity="0.9"/>
    <!-- Orbit 2 -->
    <ellipse cx="0" cy="0" rx="32" ry="14" fill="none" stroke="#3d8ef0" stroke-width="2.5" opacity="0.9"
             transform="rotate(60)"/>
    <!-- Orbit 3 -->
    <ellipse cx="0" cy="0" rx="32" ry="14" fill="none" stroke="#3d8ef0" stroke-width="2.5" opacity="0.9"
             transform="rotate(-60)"/>
    <!-- Electrons -->
    <circle cx="32" cy="0" r="3.5" fill="#f5c518"/>
    <circle cx="-16" cy="27.7" r="3.5" fill="#f5c518"/>
    <circle cx="-16" cy="-27.7" r="3.5" fill="#f5c518"/>
  </g>

  <!-- Text block -->
  <g transform="translate(112, 0)">
    <!-- "chimie" large text -->
    <text x="0" y="52" font-family="'Helvetica Neue', Arial, sans-serif"
          font-size="32" font-weight="700" letter-spacing="3"
          fill="#ffffff">chimie</text>
    <!-- "paristech" slightly smaller -->
    <text x="0" y="82" font-family="'Helvetica Neue', Arial, sans-serif"
          font-size="24" font-weight="400" letter-spacing="2"
          fill="#a8c4e8">paristech</text>
    <!-- Separator line -->
    <line x1="0" y1="92" x2="260" y2="92" stroke="#f5c518" stroke-width="1.5" opacity="0.7"/>
    <!-- PSL -->
    <text x="0" y="112" font-family="'Helvetica Neue', Arial, sans-serif"
          font-size="14" font-weight="600" letter-spacing="4"
          fill="#f5c518">PSL  ·  PARIS SCIENCES &amp; LETTRES</text>
  </g>
</svg>
