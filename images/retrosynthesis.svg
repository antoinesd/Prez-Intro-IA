<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" font-family="Inter,sans-serif">
  <rect width="680" height="360" fill="#0a1628" rx="12"/>
  <text x="340" y="28" fill="#e8edf4" font-size="15" font-weight="600" text-anchor="middle">Planification rétrosynthétique assistée par IA</text>

  <!-- Target molecule -->
  <rect x="280" y="45" width="120" height="55" fill="#1e4e90" rx="8" stroke="#3d8ef0" stroke-width="2"/>
  <text x="340" y="67" fill="#f5c518" font-size="12" font-weight="700" text-anchor="middle">Cible</text>
  <text x="340" y="85" fill="#e8edf4" font-size="11" text-anchor="middle">complexe</text>

  <!-- Retro arrow (big) -->
  <line x1="340" y1="102" x2="340" y2="128" stroke="#f5c518" stroke-width="2.5"/>
  <polygon points="334,128 340,140 346,128" fill="#f5c518"/>
  <text x="358" y="122" fill="#9bb0cc" font-size="11">⟹ rétro</text>

  <!-- Level 1 intermediates -->
  <rect x="100" y="148" width="110" height="50" fill="#1a3a5c" rx="6" stroke="#3d8ef0" stroke-width="1.5"/>
  <text x="155" y="168" fill="#e8edf4" font-size="11" text-anchor="middle">Intermédiaire A</text>
  <text x="155" y="185" fill="#9bb0cc" font-size="10" text-anchor="middle">(disponible ?)</text>

  <rect x="285" y="148" width="110" height="50" fill="#1a3a5c" rx="6" stroke="#3d8ef0" stroke-width="1.5"/>
  <text x="340" y="168" fill="#e8edf4" font-size="11" text-anchor="middle">Intermédiaire B</text>
  <text x="340" y="185" fill="#9bb0cc" font-size="10" text-anchor="middle">(décomposer)</text>

  <rect x="470" y="148" width="110" height="50" fill="#1a3a5c" rx="6" stroke="#3d8ef0" stroke-width="1.5"/>
  <text x="525" y="168" fill="#e8edf4" font-size="11" text-anchor="middle">Intermédiaire C</text>
  <text x="525" y="185" fill="#9bb0cc" font-size="10" text-anchor="middle">(disponible ?)</text>

  <!-- Lines from target to intermediates -->
  <line x1="280" y1="140" x2="205" y2="148" stroke="#3d8ef0" stroke-width="1.5"/>
  <line x1="340" y1="140" x2="340" y2="148" stroke="#3d8ef0" stroke-width="1.5"/>
  <line x1="400" y1="140" x2="475" y2="148" stroke="#3d8ef0" stroke-width="1.5"/>

  <!-- Level 2 -->
  <rect x="200" y="228" width="100" height="46" fill="#112240" rx="6" stroke="#00b09b" stroke-width="1.5"/>
  <text x="250" y="247" fill="#e8edf4" font-size="11" text-anchor="middle">Précurseur B1</text>
  <text x="250" y="263" fill="#00b09b" font-size="10" text-anchor="middle">✓ catalogue</text>

  <rect x="370" y="228" width="100" height="46" fill="#112240" rx="6" stroke="#00b09b" stroke-width="1.5"/>
  <text x="420" y="247" fill="#e8edf4" font-size="11" text-anchor="middle">Précurseur B2</text>
  <text x="420" y="263" fill="#00b09b" font-size="10" text-anchor="middle">✓ Sigma-Aldrich</text>

  <line x1="320" y1="198" x2="270" y2="228" stroke="#3d8ef0" stroke-width="1.5"/>
  <line x1="360" y1="198" x2="400" y2="228" stroke="#3d8ef0" stroke-width="1.5"/>

  <!-- Available markers for level 1 -->
  <circle cx="155" cy="172" r="5" fill="none" stroke="#f5c518" stroke-width="2"/>
  <text x="163" y="176" fill="#f5c518" font-size="10">?</text>
  <circle cx="525" cy="172" r="5" fill="#00b09b"/>
  <text x="533" y="176" fill="#00b09b" font-size="10">✓</text>

  <!-- MCTS box -->
  <rect x="40" y="295" width="220" height="52" fill="rgba(245,197,24,0.08)" rx="8" stroke="#f5c518" stroke-width="1.5"/>
  <text x="150" y="315" fill="#f5c518" font-size="12" font-weight="600" text-anchor="middle">AiZynthFinder</text>
  <text x="150" y="333" fill="#9bb0cc" font-size="11" text-anchor="middle">Monte Carlo Tree Search + NN</text>

  <!-- AI arrow -->
  <rect x="420" y="295" width="225" height="52" fill="rgba(0,176,155,0.08)" rx="8" stroke="#00b09b" stroke-width="1.5"/>
  <text x="532" y="315" fill="#00b09b" font-size="12" font-weight="600" text-anchor="middle">IBM RXN for Chemistry</text>
  <text x="532" y="333" fill="#9bb0cc" font-size="11" text-anchor="middle">Transformer → prédiction réactions</text>
</svg>
