<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" font-family="Inter,sans-serif">
  <rect width="680" height="380" fill="#0a1628" rx="12"/>
  <text x="340" y="28" fill="#e8edf4" font-size="15" font-weight="600" text-anchor="middle">Pipeline Drug Discovery : classique vs IA-accéléré</text>

  <!-- Classic pipeline -->
  <text x="50" y="58" fill="#9bb0cc" font-size="13" font-weight="600">Classique (~12 ans, ~2 Md$)</text>
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9bb0cc"/>
    </marker>
  </defs>

  <!-- Classic steps -->
  <rect x="20" y="68" width="88" height="44" fill="#162e50" rx="6" stroke="#3d8ef0" stroke-width="1.2"/>
  <text x="64" y="86" fill="#e8edf4" font-size="10" text-anchor="middle">Identification</text>
  <text x="64" y="100" fill="#9bb0cc" font-size="10" text-anchor="middle">cible · 2 ans</text>

  <line x1="108" y1="90" x2="123" y2="90" stroke="#9bb0cc" stroke-width="1.5" marker-end="url(#a1)"/>

  <rect x="123" y="68" width="88" height="44" fill="#162e50" rx="6" stroke="#3d8ef0" stroke-width="1.2"/>
  <text x="167" y="86" fill="#e8edf4" font-size="10" text-anchor="middle">Hit finding</text>
  <text x="167" y="100" fill="#9bb0cc" font-size="10" text-anchor="middle">HTS · 2 ans</text>

  <line x1="211" y1="90" x2="226" y2="90" stroke="#9bb0cc" stroke-width="1.5" marker-end="url(#a1)"/>

  <rect x="226" y="68" width="90" height="44" fill="#162e50" rx="6" stroke="#3d8ef0" stroke-width="1.2"/>
  <text x="271" y="86" fill="#e8edf4" font-size="10" text-anchor="middle">Lead optim.</text>
  <text x="271" y="100" fill="#9bb0cc" font-size="10" text-anchor="middle">3 ans</text>

  <line x1="316" y1="90" x2="331" y2="90" stroke="#9bb0cc" stroke-width="1.5" marker-end="url(#a1)"/>

  <rect x="331" y="68" width="88" height="44" fill="#162e50" rx="6" stroke="#3d8ef0" stroke-width="1.2"/>
  <text x="375" y="86" fill="#e8edf4" font-size="10" text-anchor="middle">Préclinique</text>
  <text x="375" y="100" fill="#9bb0cc" font-size="10" text-anchor="middle">3 ans</text>

  <line x1="419" y1="90" x2="434" y2="90" stroke="#9bb0cc" stroke-width="1.5" marker-end="url(#a1)"/>

  <rect x="434" y="68" width="88" height="44" fill="#1a3a5c" rx="6" stroke="#9bb0cc" stroke-width="1.2"/>
  <text x="478" y="86" fill="#e8edf4" font-size="10" text-anchor="middle">Phase I/II/III</text>
  <text x="478" y="100" fill="#9bb0cc" font-size="10" text-anchor="middle">5-7 ans</text>

  <line x1="522" y1="90" x2="537" y2="90" stroke="#9bb0cc" stroke-width="1.5" marker-end="url(#a1)"/>

  <rect x="537" y="68" width="88" height="44" fill="#0d3a1a" rx="6" stroke="#00b09b" stroke-width="1.5"/>
  <text x="581" y="86" fill="#00b09b" font-size="10" text-anchor="middle" font-weight="700">Approbation</text>
  <text x="581" y="100" fill="#9bb0cc" font-size="10" text-anchor="middle">FDA/EMA</text>

  <!-- AI pipeline -->
  <text x="50" y="148" fill="#f5c518" font-size="13" font-weight="600">Avec IA (~3-5 ans, coût réduit)</text>

  <defs>
    <marker id="a2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f5c518"/>
    </marker>
  </defs>

  <rect x="20" y="158" width="88" height="50" fill="#2a1a00" rx="6" stroke="#f5c518" stroke-width="1.5"/>
  <text x="64" y="176" fill="#f5c518" font-size="10" text-anchor="middle">AlphaFold</text>
  <text x="64" y="191" fill="#e8edf4" font-size="9" text-anchor="middle">Cible · semaines</text>
  <text x="64" y="203" fill="#9bb0cc" font-size="8.5" text-anchor="middle">↓ -90% temps</text>

  <line x1="108" y1="183" x2="123" y2="183" stroke="#f5c518" stroke-width="2" marker-end="url(#a2)"/>

  <rect x="123" y="158" width="88" height="50" fill="#2a1a00" rx="6" stroke="#f5c518" stroke-width="1.5"/>
  <text x="167" y="176" fill="#f5c518" font-size="10" text-anchor="middle">Virtual Screen</text>
  <text x="167" y="191" fill="#e8edf4" font-size="9" text-anchor="middle">10^6 molécules/h</text>
  <text x="167" y="203" fill="#9bb0cc" font-size="8.5" text-anchor="middle">↓ -80% coût</text>

  <line x1="211" y1="183" x2="226" y2="183" stroke="#f5c518" stroke-width="2" marker-end="url(#a2)"/>

  <rect x="226" y="158" width="90" height="50" fill="#2a1a00" rx="6" stroke="#f5c518" stroke-width="1.5"/>
  <text x="271" y="176" fill="#f5c518" font-size="10" text-anchor="middle">Génération</text>
  <text x="271" y="191" fill="#e8edf4" font-size="9" text-anchor="middle">De novo · mois</text>
  <text x="271" y="203" fill="#9bb0cc" font-size="8.5" text-anchor="middle">↓ -70% cycles</text>

  <line x1="316" y1="183" x2="331" y2="183" stroke="#f5c518" stroke-width="2" marker-end="url(#a2)"/>

  <rect x="331" y="158" width="88" height="50" fill="#162e50" rx="6" stroke="#9bb0cc" stroke-width="1.2"/>
  <text x="375" y="176" fill="#e8edf4" font-size="10" text-anchor="middle">Préclinique</text>
  <text x="375" y="191" fill="#9bb0cc" font-size="9" text-anchor="middle">Inchangé</text>
  <text x="375" y="203" fill="#9bb0cc" font-size="8.5" text-anchor="middle">(biologie)</text>

  <line x1="419" y1="183" x2="434" y2="183" stroke="#9bb0cc" stroke-width="1.5" marker-end="url(#a1)"/>

  <rect x="434" y="158" width="88" height="50" fill="#1a3a5c" rx="6" stroke="#9bb0cc" stroke-width="1.2"/>
  <text x="478" y="176" fill="#e8edf4" font-size="10" text-anchor="middle">Phase I/II/III</text>
  <text x="478" y="191" fill="#9bb0cc" font-size="9" text-anchor="middle">AI-augmenté</text>
  <text x="478" y="203" fill="#9bb0cc" font-size="8.5" text-anchor="middle">↓ -30% temps</text>

  <line x1="522" y1="183" x2="537" y2="183" stroke="#9bb0cc" stroke-width="1.5" marker-end="url(#a1)"/>

  <rect x="537" y="158" width="88" height="50" fill="#0d3a1a" rx="6" stroke="#00b09b" stroke-width="1.5"/>
  <text x="581" y="176" fill="#00b09b" font-size="10" text-anchor="middle" font-weight="700">Approbation</text>
  <text x="581" y="191" fill="#9bb0cc" font-size="9" text-anchor="middle">FDA/EMA</text>

  <!-- Cas Insilico -->
  <rect x="20" y="240" width="640" height="60" fill="rgba(0,176,155,0.08)" rx="10" stroke="#00b09b" stroke-width="1.5"/>
  <text x="340" y="263" fill="#00b09b" font-size="13" font-weight="700" text-anchor="middle">💊 Cas réel : Insilico Medicine — ISM001-055 (fibrose pulmonaire)</text>
  <text x="340" y="282" fill="#e8edf4" font-size="12" text-anchor="middle">Cible identifiée par IA (2019) → Molécule générée en 21 jours (2021) → Phase II positive (2023)</text>
  <text x="340" y="298" fill="#9bb0cc" font-size="11" text-anchor="middle">Classique estimé : 4-5 ans pour atteindre Phase I | IA : 18 mois de la cible à l'IND</text>

  <text x="340" y="365" fill="#9bb0cc" font-size="11" text-anchor="middle">Source : Insilico Medicine (2023) / Pushpakom et al., Nature Reviews Drug Discovery (2019)</text>
</svg>
