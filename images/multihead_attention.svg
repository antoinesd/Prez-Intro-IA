<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="Inter,sans-serif">
  <rect width="700" height="380" fill="#0a1628" rx="12"/>
  <text x="350" y="28" fill="#e8edf4" font-size="15" font-weight="600" text-anchor="middle">Multi-Head Attention — H regards en parallèle</text>

  <!-- Input -->
  <rect x="290" y="330" width="120" height="36" fill="#1a3a5c" rx="6" stroke="#3d8ef0" stroke-width="1.5"/>
  <text x="350" y="353" fill="#e8edf4" font-size="13" text-anchor="middle">Q, K, V (entrée)</text>

  <!-- Split lines to 4 heads -->
  <line x1="350" y1="330" x2="350" y2="305" stroke="#3d8ef0" stroke-width="1.5"/>
  <line x1="350" y1="305" x2="120" y2="305" stroke="#3d8ef0" stroke-width="1.5"/>
  <line x1="350" y1="305" x2="240" y2="305" stroke="#3d8ef0" stroke-width="1.5"/>
  <line x1="350" y1="305" x2="460" y2="305" stroke="#3d8ef0" stroke-width="1.5"/>
  <line x1="350" y1="305" x2="580" y2="305" stroke="#3d8ef0" stroke-width="1.5"/>
  <line x1="120" y1="305" x2="120" y2="278" stroke="#3d8ef0" stroke-width="1.5"/>
  <line x1="240" y1="305" x2="240" y2="278" stroke="#3d8ef0" stroke-width="1.5"/>
  <line x1="460" y1="305" x2="460" y2="278" stroke="#3d8ef0" stroke-width="1.5"/>
  <line x1="580" y1="305" x2="580" y2="278" stroke="#3d8ef0" stroke-width="1.5"/>

  <!-- Head 1 -->
  <rect x="60" y="200" width="120" height="76" fill="#1e4e90" rx="8" stroke="#3d8ef0" stroke-width="1.5"/>
  <text x="120" y="222" fill="#f5c518" font-size="12" font-weight="700" text-anchor="middle">Tête 1</text>
  <text x="120" y="242" fill="#e8edf4" font-size="10" text-anchor="middle">W_Q¹, W_K¹, W_V¹</text>
  <text x="120" y="259" fill="#9bb0cc" font-size="10" text-anchor="middle">Attention(Q₁,K₁,V₁)</text>
  <text x="120" y="272" fill="#9bb0cc" font-size="9" text-anchor="middle">→ Syntaxe</text>

  <!-- Head 2 -->
  <rect x="180" y="200" width="120" height="76" fill="#175c40" rx="8" stroke="#00b09b" stroke-width="1.5"/>
  <text x="240" y="222" fill="#f5c518" font-size="12" font-weight="700" text-anchor="middle">Tête 2</text>
  <text x="240" y="242" fill="#e8edf4" font-size="10" text-anchor="middle">W_Q², W_K², W_V²</text>
  <text x="240" y="259" fill="#9bb0cc" font-size="10" text-anchor="middle">Attention(Q₂,K₂,V₂)</text>
  <text x="240" y="272" fill="#9bb0cc" font-size="9" text-anchor="middle">→ Coréférences</text>

  <!-- Head 3 -->
  <rect x="400" y="200" width="120" height="76" fill="#5a3010" rx="8" stroke="#f5c518" stroke-width="1.5"/>
  <text x="460" y="222" fill="#f5c518" font-size="12" font-weight="700" text-anchor="middle">Tête 3</text>
  <text x="460" y="242" fill="#e8edf4" font-size="10" text-anchor="middle">W_Q³, W_K³, W_V³</text>
  <text x="460" y="259" fill="#9bb0cc" font-size="10" text-anchor="middle">Attention(Q₃,K₃,V₃)</text>
  <text x="460" y="272" fill="#9bb0cc" font-size="9" text-anchor="middle">→ Sémantique</text>

  <!-- Head H -->
  <rect x="520" y="200" width="120" height="76" fill="#401a3a" rx="8" stroke="#e05050" stroke-width="1.5"/>
  <text x="580" y="222" fill="#f5c518" font-size="12" font-weight="700" text-anchor="middle">Tête H</text>
  <text x="580" y="242" fill="#e8edf4" font-size="10" text-anchor="middle">W_Qᴴ, W_Kᴴ, W_Vᴴ</text>
  <text x="580" y="259" fill="#9bb0cc" font-size="10" text-anchor="middle">Attention(Qᴴ,Kᴴ,Vᴴ)</text>
  <text x="580" y="272" fill="#9bb0cc" font-size="9" text-anchor="middle">→ Relations longues</text>

  <!-- Dots between heads -->
  <text x="350" y="248" fill="#9bb0cc" font-size="20" text-anchor="middle">⋯</text>

  <!-- Concat lines -->
  <line x1="120" y1="200" x2="120" y2="175" stroke="#3d8ef0" stroke-width="1.5"/>
  <line x1="240" y1="200" x2="240" y2="175" stroke="#00b09b" stroke-width="1.5"/>
  <line x1="460" y1="200" x2="460" y2="175" stroke="#f5c518" stroke-width="1.5"/>
  <line x1="580" y1="200" x2="580" y2="175" stroke="#e05050" stroke-width="1.5"/>
  <line x1="120" y1="175" x2="580" y2="175" stroke="#9bb0cc" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Concat + Linear -->
  <rect x="200" y="108" width="300" height="52" fill="#112240" rx="8" stroke="#9bb0cc" stroke-width="1.5"/>
  <text x="350" y="130" fill="#e8edf4" font-size="13" font-weight="600" text-anchor="middle">Concat(Tête 1, …, Tête H)</text>
  <text x="350" y="150" fill="#9bb0cc" font-size="11" text-anchor="middle">→ Projection linéaire W_O</text>

  <line x1="350" y1="175" x2="350" y2="162" stroke="#9bb0cc" stroke-width="1.5"/>

  <!-- Output -->
  <rect x="275" y="55" width="150" height="46" fill="#1a3a5c" rx="8" stroke="#f5c518" stroke-width="2"/>
  <text x="350" y="74" fill="#f5c518" font-size="13" font-weight="600" text-anchor="middle">Sortie MHA</text>
  <text x="350" y="92" fill="#9bb0cc" font-size="11" text-anchor="middle">même dim que l'entrée</text>
  <line x1="350" y1="108" x2="350" y2="101" stroke="#f5c518" stroke-width="2"/>
  <polygon points="344,103 350,90 356,103" fill="#f5c518"/>
</svg>
