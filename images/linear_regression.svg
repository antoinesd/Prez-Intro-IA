<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="Inter,sans-serif">
  <rect width="700" height="400" fill="#0a1628" rx="12"/>
  <!-- Axes -->
  <line x1="60" y1="340" x2="650" y2="340" stroke="#3d8ef0" stroke-width="2"/>
  <line x1="60" y1="340" x2="60" y2="40" stroke="#3d8ef0" stroke-width="2"/>
  <!-- Axis labels -->
  <text x="355" y="375" fill="#9bb0cc" font-size="16" text-anchor="middle">Données d'entraînement (x)</text>
  <text x="20" y="195" fill="#9bb0cc" font-size="16" text-anchor="middle" transform="rotate(-90,20,195)">Prédiction (y)</text>
  <!-- Regression line -->
  <line x1="80" y1="310" x2="640" y2="70" stroke="#f5c518" stroke-width="3" stroke-dasharray="0"/>
  <!-- Data points -->
  <circle cx="100" cy="295" r="7" fill="#3d8ef0" opacity="0.9"/>
  <circle cx="140" cy="280" r="7" fill="#3d8ef0" opacity="0.9"/>
  <circle cx="180" cy="250" r="7" fill="#3d8ef0" opacity="0.9"/>
  <circle cx="220" cy="270" r="7" fill="#3d8ef0" opacity="0.9"/>
  <circle cx="270" cy="240" r="7" fill="#3d8ef0" opacity="0.9"/>
  <circle cx="310" cy="210" r="7" fill="#3d8ef0" opacity="0.9"/>
  <circle cx="350" cy="195" r="7" fill="#3d8ef0" opacity="0.9"/>
  <circle cx="400" cy="175" r="7" fill="#3d8ef0" opacity="0.9"/>
  <circle cx="450" cy="160" r="7" fill="#3d8ef0" opacity="0.9"/>
  <circle cx="490" cy="140" r="7" fill="#3d8ef0" opacity="0.9"/>
  <circle cx="530" cy="125" r="7" fill="#3d8ef0" opacity="0.9"/>
  <circle cx="580" cy="100" r="7" fill="#3d8ef0" opacity="0.9"/>
  <circle cx="615" cy="85" r="7" fill="#3d8ef0" opacity="0.9"/>
  <!-- Error lines -->
  <line x1="180" y1="250" x2="180" y2="237" stroke="#e05050" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="310" y1="210" x2="310" y2="190" stroke="#e05050" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="450" y1="160" x2="450" y2="148" stroke="#e05050" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- Legend -->
  <circle cx="510" cy="355" r="6" fill="#3d8ef0"/>
  <text x="522" y="359" fill="#9bb0cc" font-size="13">Observations</text>
  <line x1="480" y1="370" x2="500" y2="370" stroke="#f5c518" stroke-width="2"/>
  <text x="505" y="374" fill="#9bb0cc" font-size="13">Modèle appris</text>
  <line x1="460" y1="385" x2="480" y2="385" stroke="#e05050" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="484" y="389" fill="#9bb0cc" font-size="13">Erreur minimisée</text>
  <!-- Title -->
  <text x="350" y="28" fill="#e8edf4" font-size="18" font-weight="600" text-anchor="middle">Régression : la machine minimise l'erreur sur les données</text>
</svg>
