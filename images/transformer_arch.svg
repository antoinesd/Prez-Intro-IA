<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 620" font-family="Inter,sans-serif" font-size="13">
  <rect width="500" height="620" fill="#0a1628" rx="12"/>

  <!-- Title -->
  <text x="250" y="28" fill="#e8edf4" font-size="15" font-weight="700" text-anchor="middle">Architecture Transformer (Decoder-only)</text>

  <!-- Input tokens -->
  <rect x="150" y="560" width="200" height="36" fill="#1a3a5c" rx="6" stroke="#3d8ef0" stroke-width="1.5"/>
  <text x="250" y="583" fill="#9bb0cc" font-size="13" text-anchor="middle">Input tokens</text>

  <!-- Arrow up -->
  <line x1="250" y1="558" x2="250" y2="530" stroke="#3d8ef0" stroke-width="2"/>
  <polygon points="244,534 250,520 256,534" fill="#3d8ef0"/>

  <!-- Embedding -->
  <rect x="130" y="490" width="240" height="36" fill="#1e3f70" rx="6" stroke="#3d8ef0" stroke-width="1.5"/>
  <text x="250" y="513" fill="#e8edf4" font-size="13" text-anchor="middle">Token + Positional Embedding</text>

  <!-- Arrow up -->
  <line x1="250" y1="488" x2="250" y2="460" stroke="#3d8ef0" stroke-width="2"/>
  <polygon points="244,464 250,450 256,464" fill="#3d8ef0"/>

  <!-- Transformer block -->
  <rect x="80" y="190" width="340" height="268" fill="#112240" rx="10" stroke="#3d8ef0" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="250" y="215" fill="#9bb0cc" font-size="12" text-anchor="middle">× N blocs (e.g. 96 pour GPT-4)</text>

  <!-- Multi-head attention -->
  <rect x="110" y="225" width="280" height="52" fill="#1e4e90" rx="8"/>
  <text x="250" y="247" fill="#e8edf4" font-size="13" font-weight="600" text-anchor="middle">Multi-Head Self-Attention</text>
  <text x="250" y="264" fill="#9bb0cc" font-size="11" text-anchor="middle">Q · Kᵀ / √d_k  →  softmax  →  · V</text>

  <!-- Add & Norm -->
  <rect x="110" y="287" width="280" height="32" fill="#162e50" rx="6"/>
  <text x="250" y="308" fill="#f5c518" font-size="12" text-anchor="middle">Add &amp; LayerNorm</text>
  <!-- Residual connection -->
  <path d="M95 230 L95 320 L110 320" fill="none" stroke="#f5c518" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="68" y="278" fill="#f5c518" font-size="10" text-anchor="middle">skip</text>

  <!-- Separator -->
  <line x1="110" y1="327" x2="390" y2="327" stroke="#1a3a5c" stroke-width="1"/>

  <!-- FFN -->
  <rect x="110" y="335" width="280" height="52" fill="#1e4e90" rx="8"/>
  <text x="250" y="357" fill="#e8edf4" font-size="13" font-weight="600" text-anchor="middle">Feed-Forward Network</text>
  <text x="250" y="374" fill="#9bb0cc" font-size="11" text-anchor="middle">Linear → GELU → Linear</text>

  <!-- Add & Norm 2 -->
  <rect x="110" y="397" width="280" height="32" fill="#162e50" rx="6"/>
  <text x="250" y="418" fill="#f5c518" font-size="12" text-anchor="middle">Add &amp; LayerNorm</text>
  <!-- Residual connection 2 -->
  <path d="M405 340 L405 430 L390 430" fill="none" stroke="#f5c518" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="428" y="388" fill="#f5c518" font-size="10" text-anchor="middle">skip</text>

  <!-- Arrow up from block -->
  <line x1="250" y1="188" x2="250" y2="160" stroke="#3d8ef0" stroke-width="2"/>
  <polygon points="244,164 250,150 256,164" fill="#3d8ef0"/>

  <!-- Output layer -->
  <rect x="130" y="110" width="240" height="36" fill="#1e3f70" rx="6" stroke="#00b09b" stroke-width="1.5"/>
  <text x="250" y="133" fill="#e8edf4" font-size="13" text-anchor="middle">Linear + Softmax</text>

  <!-- Arrow up -->
  <line x1="250" y1="108" x2="250" y2="80" stroke="#00b09b" stroke-width="2"/>
  <polygon points="244,84 250,70 256,84" fill="#00b09b"/>

  <!-- Output -->
  <rect x="140" y="40" width="220" height="36" fill="#0d2a1e" rx="6" stroke="#00b09b" stroke-width="1.5"/>
  <text x="250" y="63" fill="#00b09b" font-size="13" font-weight="600" text-anchor="middle">Probabilités sur le vocabulaire</text>
</svg>
